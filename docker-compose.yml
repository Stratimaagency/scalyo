version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scalyo
      POSTGRES_USER: scalyo
      POSTGRES_PASSWORD: scalyo_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: scalyo
      DB_USER: scalyo
      DB_PASSWORD: scalyo_secret
      DB_HOST: db
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:5173"
      ANTHROPIC_API_KEY: ""
      STRIPE_STARTER_URL: ""
      STRIPE_GROWTH_URL: ""
      STRIPE_ELITE_URL: ""
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
