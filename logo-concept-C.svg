<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="orbitA" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="orbitB" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="meetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fond -->
  <rect width="400" height="400" rx="40" fill="#0f172a"/>
  <!-- Concept C: L'Orbite — deux arcs ouverts qui s'entrecroisent -->
  <!-- Arc Client (gauche → haut → droite) -->
  <path d="
    M 115 230
    C 95 180, 110 130, 150 110
    C 190 90, 230 100, 255 130
  " stroke="url(#orbitA)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Arc Entreprise (droite → bas → gauche) -->
  <path d="
    M 285 170
    C 305 220, 290 270, 250 290
    C 210 310, 170 300, 145 270
  " stroke="url(#orbitB)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Point d'intersection lumineux (moment de valeur) -->
  <circle cx="210" cy="195" r="44" fill="url(#meetGlow)" opacity="0.2"/>
  <circle cx="210" cy="195" r="22" fill="#5eead4" opacity="0.15"/>
  <circle cx="210" cy="195" r="10" fill="#5eead4" opacity="0.95"/>
  <!-- Petits points aux extremites pour finir les traits -->
  <circle cx="115" cy="230" r="7" fill="#0f766e" opacity="0.6"/>
  <circle cx="255" cy="130" r="7" fill="#5eead4" opacity="0.6"/>
  <circle cx="285" cy="170" r="7" fill="#5eead4" opacity="0.6"/>
  <circle cx="145" cy="270" r="7" fill="#0d9488" opacity="0.6"/>
  <!-- Texte -->
  <text x="200" y="365" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="800" letter-spacing="-1" fill="#ffffff">scal<tspan fill="#5eead4">yo</tspan></text>
</svg>