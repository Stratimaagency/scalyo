<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scalyo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><defs><radialGradient id='sg' cx='35%25' cy='35%25' r='70%25'><stop offset='0%25' stop-color='%23FF6B6B'/><stop offset='40%25' stop-color='%23FFC300'/><stop offset='80%25' stop-color='%236A82FB'/><stop offset='100%25' stop-color='%23FC5C7D'/></radialGradient></defs><circle cx='150' cy='150' r='145' fill='url(%23sg)'/><text x='150' y='205' font-family='Georgia,serif' font-size='185' font-weight='700' fill='%23FFF' text-anchor='middle'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Plausible Analytics (privacy-first, RGPD-compliant) -->
  <script defer data-domain="scalyo.app" src="https://plausible.io/js/script.js"></script>

  <script>
    (function() {
      var t = localStorage.getItem('scalyo_theme') || 'light';
      if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

      function enforceDark() {
        if (document.documentElement.getAttribute('data-theme') !== 'dark') return;
        var app = document.getElementById('app');
        if (!app) return;

        // Only target BLOCK elements larger than 40x40px (skip badges, tags, icons)
        var blocks = app.querySelectorAll('div, section, article, aside, main, header, footer, form, fieldset, figure, details, dialog, ul, ol, nav, table, thead, tbody, tr');
        for (var i = 0; i < blocks.length; i++) {
          var el = blocks[i];
          var rect = el.getBoundingClientRect();
          // Skip tiny elements (badges, tags, chips)
          if (rect.width < 50 || rect.height < 30) continue;
          // Skip elements with explicit colored backgrounds (green, red, blue, purple accents)
          var bg = getComputedStyle(el).backgroundColor;
          if (!bg || bg === 'transparent' || bg === 'rgba(0, 0, 0, 0)') continue;
          var m = bg.match(/\d+/g);
          if (!m) continue;
          var r = parseInt(m[0]), g = parseInt(m[1]), b = parseInt(m[2]);
          // Skip if it's an intentional color (not white/gray) — check if channels are very different
          var maxC = Math.max(r, g, b), minC = Math.min(r, g, b);
          if (maxC - minC > 40 && maxC < 200) continue; // Colored element, skip
          // Only darken if luminance > 0.65 (white/light gray)
          var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          if (lum > 0.65) {
            el.style.setProperty('background-color', '#1e293b', 'important');
            el.style.setProperty('border-color', '#334155', 'important');
          }
        }

        // Fix text contrast: dark text on dark parents
        var allText = app.querySelectorAll('h1, h2, h3, h4, h5, h6, p, span, label, a, strong, em, small, li, td, th, dt, dd, figcaption, blockquote, cite, time, abbr');
        for (var j = 0; j < allText.length; j++) {
          var tel = allText[j];
          var tc = getComputedStyle(tel).color;
          var tm = tc.match(/\d+/g);
          if (!tm) continue;
          var tr = parseInt(tm[0]), tg = parseInt(tm[1]), tb = parseInt(tm[2]);
          var textLum = (0.299 * tr + 0.587 * tg + 0.114 * tb) / 255;
          // Only fix if text is dark (< 0.35)
          if (textLum >= 0.35) continue;
          // Check parent background
          var parent = tel.closest('div, section, article, main, aside, form');
          if (!parent) continue;
          var pbg = getComputedStyle(parent).backgroundColor;
          var pm = pbg.match(/\d+/g);
          if (!pm) continue;
          var pLum = (0.299 * parseInt(pm[0]) + 0.587 * parseInt(pm[1]) + 0.114 * parseInt(pm[2])) / 255;
          // If parent is dark and text is dark = invisible
          if (pLum < 0.4 && textLum < 0.35) {
            // Make headers white, other text slate-300
            if (tel.tagName.match(/^H[1-6]$/) || tel.tagName === 'STRONG') {
              tel.style.setProperty('color', '#f1f5f9', 'important');
            } else {
              tel.style.setProperty('color', '#cbd5e1', 'important');
            }
          }
        }
      }

      if (t === 'dark') {
        var timer;
        var observer = new MutationObserver(function() {
          clearTimeout(timer);
          timer = setTimeout(enforceDark, 200);
        });
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(enforceDark, 600);
          setTimeout(enforceDark, 1500);
          setTimeout(enforceDark, 3000);
          var app = document.getElementById('app');
          if (app) observer.observe(app, { childList: true, subtree: true });
        });
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
