<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scalyo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'><defs><radialGradient id='sg' cx='35%25' cy='35%25' r='70%25'><stop offset='0%25' stop-color='%23FF6B6B'/><stop offset='40%25' stop-color='%23FFC300'/><stop offset='80%25' stop-color='%236A82FB'/><stop offset='100%25' stop-color='%23FC5C7D'/></radialGradient></defs><circle cx='150' cy='150' r='145' fill='url(%23sg)'/><text x='150' y='205' font-family='Georgia,serif' font-size='185' font-weight='700' fill='%23FFF' text-anchor='middle'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Plausible Analytics (privacy-first, RGPD-compliant) -->
  <script defer data-domain="scalyo.app" src="https://plausible.io/js/script.js"></script>

  <script>
    // Dark mode — theme init + universal enforcer
    (function() {
      var t = localStorage.getItem('scalyo_theme') || 'light';
      if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

      // Universal dark mode enforcer — catches ALL white elements including Vue scoped CSS
      function enforceDark() {
        if (document.documentElement.getAttribute('data-theme') !== 'dark') return;
        var app = document.getElementById('app');
        if (!app) return;
        var els = app.querySelectorAll('div, section, article, aside, main, header, footer, form, details, fieldset, figure, li, tr, td, th, nav, ul, ol');
        for (var i = 0; i < els.length; i++) {
          var el = els[i];
          var bg = getComputedStyle(el).backgroundColor;
          if (!bg || bg === 'transparent' || bg === 'rgba(0, 0, 0, 0)') continue;
          var m = bg.match(/\d+/g);
          if (!m) continue;
          var r = parseInt(m[0]), g = parseInt(m[1]), b = parseInt(m[2]);
          // If background is light (all channels > 200 or luminance > 0.7)
          var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          if (lum > 0.7) {
            el.style.setProperty('background-color', '#1e293b', 'important');
            el.style.setProperty('border-color', '#334155', 'important');
            el.style.setProperty('color', '#f1f5f9', 'important');
          }
        }
        // Also fix text elements on light backgrounds
        var texts = app.querySelectorAll('p, span, label, h1, h2, h3, h4, h5, h6, a, strong, em, small');
        for (var j = 0; j < texts.length; j++) {
          var tel = texts[j];
          var tc = getComputedStyle(tel).color;
          var tm = tc.match(/\d+/g);
          if (!tm) continue;
          var tl = (0.299*parseInt(tm[0]) + 0.587*parseInt(tm[1]) + 0.114*parseInt(tm[2])) / 255;
          // If text is dark (luminance < 0.3) on a dark page, make it light
          if (tl < 0.3) {
            // Check parent bg
            var pbg = getComputedStyle(tel.parentElement).backgroundColor;
            var pm = pbg.match(/\d+/g);
            if (pm) {
              var pl = (0.299*parseInt(pm[0]) + 0.587*parseInt(pm[1]) + 0.114*parseInt(pm[2])) / 255;
              if (pl < 0.4) {
                tel.style.setProperty('color', '#cbd5e1', 'important');
              }
            }
          }
        }
      }

      // Run after initial render and on route changes
      if (t === 'dark') {
        var observer = new MutationObserver(function(mutations) {
          // Debounce: only run every 300ms max
          clearTimeout(window._darkTimer);
          window._darkTimer = setTimeout(enforceDark, 150);
        });
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(enforceDark, 500);
          setTimeout(enforceDark, 1500);
          var app = document.getElementById('app');
          if (app) observer.observe(app, { childList: true, subtree: true });
        });
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
