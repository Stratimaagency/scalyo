<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- L'Echelle Infinie — S + flèche montante en un trait continu -->
  <path d="
    M 55 165
    C 55 165, 45 155, 45 140
    C 45 120, 65 110, 90 105
    C 120 99, 145 92, 145 70
    C 145 50, 125 38, 105 38
    C 90 38, 80 45, 80 45
    L 80 45
  " stroke="url(#arrow)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fleche au sommet qui part vers le haut-droite -->
  <path d="
    M 80 45
    L 55 18
  " stroke="url(#arrow)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Pointe de fleche -->
  <polygon points="45,5 58,22 40,25" fill="#14b8a6"/>
  <!-- Glow au sommet -->
  <circle cx="45" cy="8" r="14" fill="url(#glow)" opacity="0.6"/>
  <circle cx="45" cy="8" r="5" fill="#5eead4"/>
</svg>