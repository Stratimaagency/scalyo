<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="ray1" x1="50%" y1="50%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="ray2" x1="50%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="ray3" x1="50%" y1="50%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="45%" r="20%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fond -->
  <rect width="400" height="400" rx="40" fill="#0f172a"/>
  <!-- Concept B: Le Hub — point central + 3 courbes rayonnantes -->
  <!-- Courbe 1: haut-gauche (Client) -->
  <path d="M 195 175 C 170 140, 140 110, 105 95" stroke="url(#ray1)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Courbe 2: haut-droite (Equipe) -->
  <path d="M 210 175 C 240 140, 270 115, 305 105" stroke="url(#ray2)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Courbe 3: bas-centre (Valeur) -->
  <path d="M 200 195 C 200 230, 195 260, 185 295" stroke="url(#ray3)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Points aux extremites -->
  <circle cx="105" cy="95" r="10" fill="#5eead4" opacity="0.7"/>
  <circle cx="305" cy="105" r="10" fill="#2dd4bf" opacity="0.7"/>
  <circle cx="185" cy="295" r="10" fill="#14b8a6" opacity="0.7"/>
  <!-- Hub central -->
  <circle cx="200" cy="185" r="50" fill="url(#hubGlow)" opacity="0.3"/>
  <circle cx="200" cy="185" r="26" fill="#14b8a6"/>
  <circle cx="200" cy="185" r="14" fill="#0f172a"/>
  <circle cx="200" cy="185" r="7" fill="#5eead4"/>
  <!-- Texte -->
  <text x="200" y="365" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="800" letter-spacing="-1" fill="#ffffff">scal<tspan fill="#5eead4">yo</tspan></text>
</svg>