// ══════════════════════════════════════════════════

const SUPABASE_URL = "https://qqxdaaivklanivzgtctk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxeGRhYWl2a2xhbml2emd0Y3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjgzNzQsImV4cCI6MjA4ODYwNDM3NH0.6UptjImD4yxMjFfQ6tFZy9_25xE1Ry9H8q19WUmImBE";

// ══════════════════════════════════════════════════
// SCALYO PERSISTENCE LAYER — Supabase-first, localStorage fallback
// Tables requises (à créer dans Supabase si absentes) :
//   kpi_data     : id, company_id, period, kpis(jsonb), goals(jsonb), custom_kpis(jsonb), history(jsonb), created_at, updated_at
//   task_board   : id, company_id, tasks(jsonb), created_at, updated_at
//   cal_events   : id, company_id, events(jsonb), created_at, updated_at
//   account_todos: id, company_id, account_id, todos(jsonb), created_at, updated_at
// ══════════════════════════════════════════════════
const SB = {
  // ── upsert générique avec fallback localStorage
  async save(table, companyId, payload, lsKey) {
    // localStorage immédiat (cache)
    if(lsKey) { try { localStorage.setItem(lsKey, JSON.stringify(payload)); } catch(e){} }
    if(!companyId) return { error: "no_company_id" };
    const { error } = await db.from(table).upsert(
      { company_id: companyId, ...payload, updated_at: new Date().toISOString() },
      { onConflict: "company_id" }
    );
    return { error };
  },

  // ── upsert avec clé composée (company_id + champ secondaire)
  async saveWith(table, companyId, conflictCol, conflictVal, payload, lsKey) {
    if(lsKey) { try { localStorage.setItem(lsKey, JSON.stringify(payload)); } catch(e){} }
    if(!companyId) return { error: "no_company_id" };
    const { error } = await db.from(table).upsert(
      { company_id: companyId, [conflictCol]: conflictVal, ...payload, updated_at: new Date().toISOString() },
      { onConflict: `company_id,${conflictCol}` }
    );
    return { error };
  },

  // ── lecture avec fallback localStorage
  async load(table, companyId, filter, lsKey) {
    // Essai Supabase
    if(companyId) {
      let q = db.from(table).select("*").eq("company_id", companyId);
      if(filter) Object.entries(filter).forEach(([k,v]) => { q = q.eq(k,v); });
      const { data, error } = await q.maybeSingle();
      if(!error && data) return data;
    }
    // Fallback localStorage
    if(lsKey) { try { const s=localStorage.getItem(lsKey); if(s) return { _fromLS: true, ...JSON.parse(s) }; } catch(e){} }
    return null;
  },

  // ── suppression d'une entrée
  async remove(table, companyId, filter) {
    if(!companyId) return;
    let q = db.from(table).delete().eq("company_id", companyId);
    if(filter) Object.entries(filter).forEach(([k,v]) => { q = q.eq(k,v); });
    await q;
  },

};

// ── Helpers KPI
const KpiDB = {
  async saveMonthly(companyId, period, kpis, goals) {
    // DT-01 : inliné, SB.saveWith() retiré (code mort)
    try { localStorage.setItem(`scalyo_kpis_${period}`, JSON.stringify({kpis, goals})); } catch(e){}
    if(!companyId) return;
    await db.from("kpi_data").upsert(
      { company_id: companyId, period, kpis, goals, updated_at: new Date().toISOString() },
      { onConflict: "company_id,period" }
    );
  },
  async saveCustom(companyId, customKpis, kpiHistory) {
    const payload = { custom_kpis: customKpis, history: kpiHistory };
    if(companyId) {
      await db.from("kpi_data").upsert(
        { company_id: companyId, period: "__custom__", ...payload, updated_at: new Date().toISOString() },
        { onConflict: "company_id,period" }
      );
    }
    try { localStorage.setItem("scalyo_custom_kpis", JSON.stringify(customKpis)); } catch(e){}
    try { localStorage.setItem("scalyo_kpi_history", JSON.stringify(kpiHistory)); } catch(e){}
  },
  async saveGoals(companyId, goals) {
    if(companyId) {
      await db.from("kpi_data").upsert(
        { company_id: companyId, period: "__goals__", goals, updated_at: new Date().toISOString() },
        { onConflict: "company_id,period" }
      );
    }
    try { localStorage.setItem("scalyo_goals", JSON.stringify(goals)); } catch(e){}
  },
  async loadAll(companyId) {
    if(!companyId) return { monthly:{}, custom:[], goals:{}, history:{} };
    const { data } = await db.from("kpi_data").select("*").eq("company_id", companyId);
    if(!data||!data.length) return null;
    const monthly={}, goals={mrr:0,churned:0,nps:40,renewalRate:85,csat:8,resolvedTickets:0};
    let customKpis=[], history={};
    data.forEach(row => {
      if(row.period==="__custom__") { customKpis=row.custom_kpis||[]; history=row.history||{}; }
      else if(row.period==="__goals__") { Object.assign(goals, row.goals||{}); }
      else if(row.kpis) { monthly[row.period]=row.kpis; if(row.goals) Object.assign(goals, row.goals); }
    });
    return { monthly, customKpis, goals, history };
  }
};

const TaskDB = {
  async save(companyId, tasks) {
    try { localStorage.setItem("scalyo_tasks", JSON.stringify(tasks)); } catch(e){}
    if(!companyId) return;
    try {
      const { error } = await db.from("task_board").upsert(
        { company_id: companyId, tasks },
        { onConflict: "company_id" }
      );
      if(error) console.error("TaskDB.save error:", error.message);
    } catch(e) { console.error("TaskDB.save exception:", e); }
  },
  async load(companyId) {
    if(companyId) {
      const { data } = await db.from("task_board").select("tasks").eq("company_id", companyId).maybeSingle();
      if(data?.tasks) return data.tasks;
    }
    try { const r=localStorage.getItem("scalyo_tasks"); return r?JSON.parse(r):[]; } catch(e){ return []; }
  }
};

// ── Helpers Todos par compte
const TodoDB = {
  async save(companyId, accountId, todos) {
    try { localStorage.setItem(`scalyo_todos_${accountId}`, JSON.stringify(todos)); } catch(e){}
    if(!companyId) return;
    await db.from("account_todos").upsert(
      { company_id: companyId, account_id: accountId, todos, updated_at: new Date().toISOString() },
      { onConflict: "company_id,account_id" }
    );
  },
  async load(companyId, accountId) {
    if(companyId) {
      const { data } = await db.from("account_todos").select("todos").eq("company_id", companyId).eq("account_id", accountId).maybeSingle();
      if(data?.todos) return data.todos;
    }
    try { const r=localStorage.getItem(`scalyo_todos_${accountId}`); return r?JSON.parse(r):null; } catch(e){ return null; }
  },
  // Suppression d'un compte = suppression de ses todos
  async remove(companyId, accountId) {
    try { localStorage.removeItem(`scalyo_todos_${accountId}`); } catch(e){}
    if(!companyId) return;
    await db.from("account_todos").delete().eq("company_id", companyId).eq("account_id", accountId);
  }
};

**5–15 min : Preuves de valeur (ce que vous avez livré)**

→ 1 cas concret de valeur délivrée (ROI client)
→ Ne défendez pas — présentez des faits

**15–25 min : Situation actuelle (ce que le client vit)**
"Avant de parler de la suite, j'aimerais comprendre où vous en êtes. Quels sont vos 2-3 défis prioritaires pour le prochain trimestre ?"
→ Écouter et prendre des notes visibles (montre que vous écoutez)
→ Connecter leurs défis à vos capacités

**25–35 min : Plan Q[N+1] (ce qu'on fait ensemble)**
→ 3 objectifs pour le prochain trimestre (co-construits)
→ Actions de votre côté + actions de leur côté
→ Métriques de suivi et date du prochain QBR

**35–45 min : Questions ouvertes et signature**

const MANAGER_TIPS_EN = [
  {cat:"🎯 CSM Onboarding",tips:[
    {q:"How to structure a new CSM's onboarding?",a:"1. Prepare an onboarding kit (docs, tools, access). 2. Assign a mentor CSM for the first 2 weeks. 3. Schedule shadow calls on key accounts. 4. Set progressive goals: partial portfolio D+15, full D+60. 5. Weekly 1:1 for the first 3 months."},
    {q:"Which KPIs to track for a CSM on probation?",a:"Focus on process adoption (weekly calls held, CRM filled), first client interactions (satisfaction), and tool mastery (roadmap, QBR templates). Not on churn yet — too early."},
    {q:"How to accelerate skill development?",a:"Weekly 30-min sessions on a real scenario. Review one QBR per week. Share playbooks. Peer reviews of important emails. Celebrate wins publicly within the team."}
  ]},
  {cat:"📊 Performance Management",tips:[
    {q:"How to set balanced CS objectives?",a:"OKR framework adapted for CS: 1 retention objective (rate), 1 growth objective (expansion ARR), 1 satisfaction objective (NPS/CSAT). Break down by CSM weighted by portfolio complexity. Review quarterly."},
    {q:"How to prevent CSM burnout?",a:"Monitor workload (>30 accounts = risk). Identify early signals (CRM note quality, meeting cancellations, tone in Slack). Proactively rebalance portfolios. Create decompression rituals (informal weekly debrief)."},
    {q:T("sq1",lang),a:"40-min structure: 10 min free (mood, blockers), 20 min pipeline (at-risk accounts, ongoing upsells), 10 min development (skill of the month, objective). Document actions. Alternate in-person / remote."}
  ]},
  {cat:"👥 Team Dynamics",tips:[
    {q:"How to create a knowledge-sharing culture in the CS team?",a:"Weekly 30-min team sync: 1 win, 1 challenge, 1 learning. Collaborative playbook library. Peer mentoring program. Team bonuses on collective goals (not just individual)."},
    {q:"How to manage an underperforming CSM?",a:"1. Diagnose first: skill or motivation issue? 2. 60-day improvement plan with clear milestones. 3. Intensified support (co-listening calls, immediate feedback). 4. Decision at D+60: continue, reposition, or separate."}
  ]},
  {cat:"💡 Strategy & Growth",tips:[
    {q:"How to demonstrate CS value to the executive team?",a:"Finance language: ARR protected by CS, expansion/churn ratio, NRR (Net Revenue Retention). Calculate cost of churn vs. cost of CS. Benchmark: healthy SaaS targets NRR > 110%."},
    {q:"How to scale the CS team efficiently?",a:"Optimal CSM/account ratio: 1 CSM for 20-40 SMB accounts or 10-15 Enterprise accounts. Automate low-touch (email nurturing, auto onboarding). Create segments: Digital-first, Mid-touch, High-touch. Hire when churn rate exceeds 5%."}
  ]}
];

const CSM_TIPS_EN = [
  {cat:"🤝 Collaborate Without Hierarchy",tips:[
    {q:"How to influence without formal authority?",a:"Credibility is built before you need it. 1. Master your domain (expertise = social capital). 2. Bring solutions, not problems. 3. Also advance others' topics. 4. Communicate transparently about your accounts."},
    {q:"How to handle a conflict with a colleague CSM?",a:"DESC method: Describe (facts, not interpretation), Express (impact on you), Specify (what you want), Consequence (what will change). In a 1:1, not in a meeting. If stuck, escalate quickly to the manager."},
    {q:"How to avoid overlaps and scope conflicts?",a:"Team rituals: weekly sync of 'hot' accounts, each CSM shares 3 key signals. Mandatory CRM updates. Documented handover in case of transfer. Tacit agreement: help colleagues' accounts when absent, always with their consent."}
  ]},
  {cat:"📈 Contribute Beyond Your Scope",tips:[
    {q:"How to contribute to CS process improvement?",a:"Keep a 'friction log': note what regularly blocks your clients. At month-end, synthesize and propose 1 concrete improvement. The best ideas come from the field — value them in team meetings."},
    {q:"How to become a reference in the team?",a:"Specialize in 1-2 verticals (B2B SaaS, Retail, etc.) or skills (data, complex onboarding). Share your learnings in meetings. Answer juniors' questions. Reference = available + competent + generous."}
  ]},
  {cat:"🧠 Mindset & Wellbeing",tips:[
    {q:"How to manage overload without alerting the manager?",a:"Prioritize by urgency/impact: make a list, categorize. Delegate administrative tasks (if possible). Block 2h/day of deep work. And talk to your manager — good managers prefer to know early rather than late."},
    {q:"How to avoid professional burnout in CS?",a:"Identify your top 3 energy drains (difficult clients, useless meetings, heavy CRM) and your top 3 motivation sources. Build a typical week that preserves balance. CS is intense — the best are also those who know how to protect themselves."}
  ]}
]

const MANAGER_TIPS_KR = [

    {q:"새 CSM 온보딩을 어떻게 구성하나요?",a:"1. 온보딩 키트 준비 (문서, 도구, 접근권). 2. 첫 2주 멘토 CSM 배정. 3. 주요 계정 섀도 콜 예약. 4. 점진적 목표 설정: D+15 부분 포트폴리오, D+60 전체. 5. 첫 3개월 주간 1:1."},
    {q:"수습 중 CSM을 위한 KPI는 무엇인가요?",a:"D+30: 100% 계정 파악, 첫 미팅 완료. D+60: 100% 헬스 스코어 최신화, 위험 계정 파악. D+90: 100% QBR 실행, 기여 NPS > 7. 첫 3개월: 이탈 0."}

    {q:"CSM 번아웃을 어떻게 예방하나요?",a:"업무량 지표 모니터링: CSM당 계정 수 (권장 25-30). 주간 체크인에서 피로 신호 파악. 명확한 피크 우선순위. 월간 팀 미팅에서 번아웃 정상화."}

  {cat:"👥 팀 다이나믹스",tips:[

  ]},
  {cat:"💡 전략 및 성장",tips:[

    {q:"CS 프로세스 개선에 어떻게 기여하나요?",a:"반복되는 문제를 체계적으로 문서화. 분기별 팀과 솔루션 검토. 제안을 ROI 추정과 함께 제안."}
