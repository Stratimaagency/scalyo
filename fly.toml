app = "scalyo"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  DJANGO_ALLOWED_HOSTS = ".fly.dev"
  DJANGO_DEBUG = "False"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[deploy]
  release_command = "python manage.py migrate --noinput"
