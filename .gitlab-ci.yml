stages:
  - build
  - deploy

build_landing:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "landing-${CI_COMMIT_REF_SLUG}"
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

build_app:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "app-${CI_COMMIT_REF_SLUG}"
    paths:
      - app-v2/frontend/node_modules/
  script:
    - cd app-v2/frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - app-v2/frontend/dist/
    expire_in: 1 hour

deploy_production:
  stage: deploy
  image: node:20-alpine
  only:
    - production
  needs:
    - build_landing
    - build_app
  script:
    - npm install -g wrangler
    - mkdir -p dist
    - cp -r frontend/dist/. dist/
    - cp -r app-v2/frontend/dist/. dist/
    - wrangler pages deploy dist --project-name=scalyo-app --branch=main
