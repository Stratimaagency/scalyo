stages:
  - build
  - deploy

build_landing:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "landing-${CI_COMMIT_REF_SLUG}"
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

build_app:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "app-${CI_COMMIT_REF_SLUG}"
    paths:
      - app-v2/frontend/node_modules/
  script:
    - cd app-v2/frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - app-v2/frontend/dist/
    expire_in: 1 hour

deploy_production:
  stage: deploy
  image: node:20-alpine
  only:
    - production
  needs:
    - build_landing
    - build_app
  script:
    - npm install -g wrangler
    - mkdir -p dist

    # 1. Copy landing first (includes its index.html + hashed assets)
    - cp -r frontend/dist/. dist/

    # 2. Rename landing index.html to preserve it
    - mv dist/index.html dist/index-landing.html

    # 3. Copy app (includes app index.html + hashed assets — no filename clash)
    - cp -r app-v2/frontend/dist/. dist/

    # 4. Create Cloudflare Pages _redirects routing rules
    - |
      cat > dist/_redirects << 'EOF'
      /                     /index-landing.html   200
      /legal                /index-landing.html   200
      /login                /index.html           200
      /register             /index.html           200
      /app/*                /index.html           200
      /*                    /index-landing.html   200
      EOF

    # 5. Deploy unified dist to Cloudflare Pages production
    - wrangler pages deploy dist --project-name=scalyo-app --branch=main
