stages:
  - build
  - deploy

# --- PRODUCTION ---

build:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "app-${CI_COMMIT_REF_SLUG}"
    paths:
      - app-v2/frontend/node_modules/
  script:
    - cd app-v2/frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - app-v2/frontend/dist/
    expire_in: 1 hour

deploy_production:
  stage: deploy
  image: node:20-alpine
  only:
    - production
  needs:
    - build
  script:
    - cd app-v2/frontend
    - npm install -g wrangler
    # --- Push env vars to Cloudflare Pages via API ---
    # Provider config is set in Cloudflare Dashboard (not CI) to avoid accidental overrides.
    # Only secrets are pushed here. Provider switch = Cloudflare Dashboard only.
    - |
      curl -s -X PATCH \
        "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/scalyo-app" \
        -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d "{
          \"deployment_configs\": {
            \"production\": {
              \"env_vars\": {
                \"SUPABASE_JWT_SECRET\": { \"value\": \"$SUPABASE_JWT_SECRET\", \"type\": \"secret_text\" },
                \"STRIPE_WEBHOOK_SECRET\": { \"value\": \"$STRIPE_WEBHOOK_SECRET\", \"type\": \"secret_text\" },
                \"SUPABASE_SERVICE_ROLE_KEY\": { \"value\": \"$SUPABASE_SERVICE_ROLE_KEY\", \"type\": \"secret_text\" }
              }
            }
          }
        }"
      echo "Cloudflare secrets synced (provider config managed via Dashboard)"
    # --- Deploy ---
    - wrangler pages deploy dist --project-name=scalyo-app --branch=main

# --- PREPROD ---

build_preprod:
  stage: build
  image: node:20-alpine
  only:
    - preprod-v2
  cache:
    key: "app-${CI_COMMIT_REF_SLUG}"
    paths:
      - app-v2/frontend/node_modules/
  script:
    - cd app-v2/frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - app-v2/frontend/dist/
    expire_in: 1 hour

deploy_preprod:
  stage: deploy
  image: node:20-alpine
  only:
    - preprod-v2
  needs:
    - build_preprod
  script:
    - cd app-v2/frontend
    - npm install -g wrangler
    - wrangler pages deploy dist --project-name=scalyo-app --branch=preprod
