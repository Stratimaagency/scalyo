stages:
  - build
  - deploy

build:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "app-${CI_COMMIT_REF_SLUG}"
    paths:
      - app-v2/frontend/node_modules/
  script:
    - cd app-v2/frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - app-v2/frontend/dist/
    expire_in: 1 hour

deploy_production:
  stage: deploy
  image: node:20-alpine
  only:
    - production
  needs:
    - build
  script:
    - cd app-v2/frontend
    - npm install -g wrangler
    - wrangler pages deploy dist --project-name=scalyo-app --branch=main
    - cd ../..
    - apk add --no-cache curl
    - curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh
    - supabase functions deploy scalyo-api --project-ref hcqninmpmzpqjtedyjyj --no-verify-jwt
    - supabase functions deploy scalyo-webhook --project-ref hcqninmpmzpqjtedyjyj --no-verify-jwt
