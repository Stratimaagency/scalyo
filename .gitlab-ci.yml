stages:
  - build
  - deploy

build:
  stage: build
  image: node:20-alpine
  only:
    - production
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - app-v2/frontend/node_modules/
  script:
    - cd app-v2/frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - app-v2/frontend/dist/
    expire_in: 1 hour

deploy_production:
  stage: deploy
  image: node:20-alpine
  only:
    - production
  needs:
    - build
  script:
    - cd app-v2/frontend
    - npm install -g wrangler
    - wrangler pages deploy dist --project-name=scalyo-app --branch=main
