<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Scalyo - Logo Concepts</title>
<style>
  body { background: #0f172a; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 50px; }
  h1 { font-size: 32px; letter-spacing: -1px; }
  .concepts { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; }
  .concept { text-align: center; }
  .concept h2 { font-size: 18px; margin-bottom: 8px; color: #14b8a6; }
  .concept p { font-size: 13px; color: #94a3b8; max-width: 220px; margin: 0 auto; }
  .logo-box { width: 200px; height: 200px; margin: 20px auto; background: #1e293b; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid #334155; }
  svg { width: 160px; height: 160px; }
</style>
</head>
<body>
  <h1>Scalyo Logo Concepts</h1>
  <div class="concepts">

    <div class="concept">
      <h2>Concept 1</h2>
      <p>La Vague de Croissance</p>
      <div class="logo-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="wave" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#0d9488"/>
              <stop offset="50%" stop-color="#14b8a6"/>
              <stop offset="100%" stop-color="#34d399"/>
            </linearGradient>
          </defs>
          <path d="M 130 35 C 130 35, 115 25, 95 25 C 65 25, 45 42, 45 62 C 45 82, 60 92, 85 100 C 115 110, 155 118, 155 142 C 155 168, 130 180, 100 180 C 78 180, 65 170, 65 170" stroke="url(#wave)" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="133" cy="33" r="6" fill="#34d399" opacity="0.9"/>
          <circle cx="133" cy="33" r="12" fill="#34d399" opacity="0.2"/>
        </svg>
      </div>
      <p>S fluide + point lumineux<br>Style Nike / Spotify</p>
    </div>

    <div class="concept">
      <h2>Concept 2</h2>
      <p>L'Echelle Infinie</p>
      <div class="logo-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#0f766e"/>
              <stop offset="100%" stop-color="#14b8a6"/>
            </linearGradient>
            <radialGradient id="glow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#5eead4"/>
              <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <path d="M 55 165 C 55 165, 45 155, 45 140 C 45 120, 65 110, 90 105 C 120 99, 145 92, 145 70 C 145 50, 125 38, 105 38 C 90 38, 80 45, 80 45 L 80 45" stroke="url(#arrow)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M 80 45 L 55 18" stroke="url(#arrow)" stroke-width="16" fill="none" stroke-linecap="round"/>
          <polygon points="45,5 58,22 40,25" fill="#14b8a6"/>
          <circle cx="45" cy="8" r="14" fill="url(#glow)" opacity="0.6"/>
          <circle cx="45" cy="8" r="5" fill="#5eead4"/>
        </svg>
      </div>
      <p>S + fleche montante<br>Style Tesla / Airbnb</p>
    </div>

    <div class="concept">
      <h2>Concept 3</h2>
      <p>Le Pulse</p>
      <div class="logo-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
          <defs>
            <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#0f766e"/>
              <stop offset="100%" stop-color="#0d9488"/>
            </linearGradient>
            <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#0d9488"/>
              <stop offset="100%" stop-color="#14b8a6"/>
            </linearGradient>
            <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#14b8a6"/>
              <stop offset="100%" stop-color="#2dd4bf"/>
            </linearGradient>
            <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#2dd4bf"/>
              <stop offset="100%" stop-color="#5eead4"/>
            </linearGradient>
            <linearGradient id="bar5" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#5eead4"/>
              <stop offset="100%" stop-color="#99f6e4"/>
            </linearGradient>
          </defs>
          <rect x="90" y="28" width="68" height="16" rx="8" fill="url(#bar5)"/>
          <rect x="50" y="56" width="80" height="16" rx="8" fill="url(#bar4)"/>
          <rect x="60" y="84" width="80" height="16" rx="8" fill="url(#bar3)"/>
          <rect x="70" y="112" width="80" height="16" rx="8" fill="url(#bar2)"/>
          <rect x="42" y="140" width="68" height="16" rx="8" fill="url(#bar1)"/>
        </svg>
      </div>
      <p>5 barres = S + croissance<br>Style IBM / Stripe</p>
    </div>

  </div>
</body>
</html>
