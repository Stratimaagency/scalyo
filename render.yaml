databases:
  - name: scalyo-db
    plan: free
    databaseName: scalyo
    user: scalyo

services:
  - type: web
    name: scalyo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: scalyo-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://scalyo-frontend.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_STARTER_URL
        sync: false
      - key: STRIPE_GROWTH_URL
        sync: false
      - key: STRIPE_ELITE_URL
        sync: false

  - type: web
    name: scalyo-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://scalyo-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
